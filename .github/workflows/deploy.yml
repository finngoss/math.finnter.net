name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Quartz dependencies
        working-directory: quartz
        run: npm ci

      - name: Install Quartz plugins
        working-directory: quartz
        run: npx quartz plugin install --from-config

      - name: Build Quartz site
        working-directory: quartz
        run: npx quartz build -d mathema -o ../site/mathema

      - name: Assemble combined site
        run: |
          mkdir -p site
          rsync -av --exclude='quartz' --exclude='site' --exclude='.github' --exclude='.git' ./ site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
